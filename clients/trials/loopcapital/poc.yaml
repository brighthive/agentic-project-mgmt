# Loop Capital PoC tracker config — single source of truth for scope/ownership/plan.
# Mirrors clients/trials/longaeva/poc.yaml's schema. See scripts/poc_tracker/loader.py.
#
# Unlike Longaeva's 14-day trial window, Loop Capital is demo-gated, not day-gated:
# progress is measured against Suzanne's 3 committed demo points for 2026-07-17, not a
# fixed day-N schedule. `phases` below use demo-relative labels (T-5, T-3, T-1, T-0)
# instead of Day N.

slug: loopcapital
trial_dates: "Demo 1: 2026-07-09 (done) — Demo 2 / decision gate: 2026-07-17"

scope:
  epic: BH-1036
  adjacent_epics:
    - BH-1037
    - BH-1061
  ticket_keys:
    - BH-1053
    - BH-1055
    - BH-1057
    - BH-1058
    - BH-1059
    - BH-1060
    - BH-1067
    - BH-1038
    - BH-1039
    - BH-1040
    - BH-1041
  keyword_jql: |
    project = BH AND statusCategory != Done AND (
      summary ~ "Loop Capital" OR description ~ "Loop Capital"
    )

repos:
  - brighthive/brightbot
  - brighthive/brighthive-platform-core
  - brighthive/agentic-project-mgmt

slack:
  channel_id: ""  # TBD — confirm with Suzanne/Matt which channel tracks this deal

ownership:
  - owner: Kuri Chinca
    lane: All engineering tickets currently assigned (BH-1038–1060) — see phases below for suggested split if delegated
    slack_id: ""
  - owner: Suzanne
    lane: Client relationship, demo script, sales-gate commitments
    slack_id: ""
  - owner: Matt
    lane: Kickoff logistics, BrightHive Studio setup, client-side asset coordination
    slack_id: ""

phases:
  - title: "Track A — Legacy Analyst Analyzer Agent (SSIS/SSRS/Storage) — COMPLETE"
    description: >
      Delivered for the 2026-07-09 demo. Fully shipped per BH-860 epic (14 tickets, all Done).
      No further engineering work needed on this track. Frank's reaction: platform is real,
      but proactivity wasn't demonstrated and "your screen says this is not live" on a
      separate page — this drove the Track B commitment below.
    expectations:
      - day: "Done"
        outcome: "SSIS diagnostics skill (bottleneck detection + dbt migration suggestions)"
        linked: [BH-863]
      - day: "Done"
        outcome: "SSRS diagnostics skill"
        linked: [BH-863]
      - day: "Done"
        outcome: "Storage optimization skill"
        linked: [BH-863]
      - day: "Done"
        outcome: "Synthetic SSIS fixture + staging validation"
        linked: [BH-869, BH-866]

  - title: "Track B, Point 1 — Proactive monitor/detect/alert loop (GC-14)"
    description: >
      Suzanne's demo commitment #1: "the engineering agent and how it proactively monitors,
      detects and resolves issues with the ability to alert the user on what it finds."
      This is the watchdog capability node — the actual missing-proactivity primitive this
      whole spec was built to close. Golden Case: docs/specs/golden-cases-loopcapital.md#GC-14
      (Frank's ops team learns their nightly Asset Management dbt job broke before a portfolio
      manager asks why the SSRS holdings report looks wrong).
    expectations:
      - day: "T-5 (by 2026-07-12)"
        outcome: "BH-1042 contract finalized — types/registry/MCP tool, no ambiguity for implementers"
        linked: [BH-1042]
      - day: "T-4"
        outcome: "BH-1054 watchdog node registered + wired to existing scheduled dispatcher"
        linked: [BH-1054]
      - day: "T-4"
        outcome: "BH-1043 dbt job/run health poller — detects a real failed run"
        linked: [BH-1043]
      - day: "T-3"
        outcome: "BH-1046 alert path — Slack + webapp both show the detected failure (dual-write verified)"
        linked: [BH-1046]
      - day: "T-3"
        outcome: "CRITICAL, filed pass 35: BH-1067 renderers for 5 of 6 new stage values — dual-write alone is not enough; dbt_run_stale/databricks_job_failure/databricks_cluster_unhealthy/etl_job_failure/source_disk_low have zero visible text on either surface without this, identical to GC-12's confirmed dead-end (BH-1065/1066)"
        linked: [BH-1067]
      - day: "T-2"
        outcome: "End-to-end dry run: real dbt Cloud failure (BH-1058 fixture) → detected unprompted → alerted on both surfaces"
        linked: [BH-1058]

  - title: "Track B, Point 2 — SQL Server with no MCP (disk-space monitoring) (GC-15)"
    description: >
      Suzanne's demo commitment #2, Frank's literal named example: "how MCP will connect to
      the SQL server when the server does not have an MCP... monitoring the disk space and
      alerting when it's at 20% capacity left." Direct rebuttal to Frank's stated disbelief
      that this is technically possible — must be demoed against REAL infrastructure per
      test-behavior-real.md, not a mock, since a mocked page is exactly what triggered his
      "this is not live" reaction on 2026-07-09. Golden Case:
      docs/specs/golden-cases-loopcapital.md#GC-15.
    expectations:
      - day: "T-5 — DONE 2026-07-13"
        outcome: "BH-1057: local Docker SQL Server sandbox built + verified (clients/trials/loopcapital/sandbox/), replaces the original AWS RDS plan. SQL Server Agent enabled via MSSQL_AGENT_ENABLED, no billable resource needed."
        linked: [BH-1057]
      - day: "T-4"
        outcome: "BH-1045 disk/job query wired through existing WarehousePort/SynapseConnection chain — zero new connectivity"
        linked: [BH-1045]
      - day: "T-3 — DONE 2026-07-13"
        outcome: "Demo data seeded: sandbox's fill_disk.sh verified real ~18% free space, real SQL Server Agent jobs (one real Succeeded, one real Failed run) — run ./setup.sh before the demo"
        linked: [BH-1057]
      - day: "T-2"
        outcome: "Dry run: watchdog polls real SQL Server, detects low disk, alerts — no MCP on the SQL Server side, ever. Requires BH-1067's source_disk_low renderer to actually show text (detection without it is silent)."
        linked: [BH-1045, BH-1054, BH-1067]

  - title: "Track B, Point 3 — Fix-recurrence surfacing (GC-16, gated on GC-17)"
    description: >
      Suzanne's demo commitment #3: "the ability to build skills that help surface the fixes
      the agent applied when they are not abided by so we can avoid the recurrence of the same
      kind of issue." Mechanism: self-healing-pipelines.md's surgical-PR loop (GC-11), wired to
      this spec's watchdog signals — with a CRITICAL safety fix required first (see below).
      Golden Cases: docs/specs/golden-cases-loopcapital.md#GC-16 (the demo scene — a recurring
      pipeline break gets a reviewable PR, never an auto-merge) and #GC-17 (the safety
      precondition GC-16 cannot demo without — GC-17 is its own gating case, not a sub-step of
      GC-16, and is the cheapest of the four to make live since it needs no infrastructure).
    expectations:
      - day: "T-5"
        outcome: "GC-17 (safety precondition, cheapest to unblock — pure static test, no infra dependency): BH-1047's code-level exclusion of github_merge_pull_request from the remediation loop's tool list — 'never auto-merge' was previously prompt-only, zero code enforcement"
        linked: [BH-1047]
      - day: "T-4"
        outcome: "root_cause_class classifier wired (DATA_SHAPE vs JOB_RUNTIME) — routes correctly, never fabricates a fix"
        linked: [BH-1047]
      - day: "T-3"
        outcome: "DATA_SHAPE signal routes into GC-11's existing surgical-PR loop, human-approval-gated"
        linked: [BH-1047]
      - day: "T-2"
        outcome: "GC-16 demo dry run: a detected failure surfaces a surgical PR with a plain-language diagnosis, requires human approval, never auto-merges — requires GC-17 to have already passed"
        linked: [BH-1047]

  - title: "T-1 — Full dress rehearsal"
    description: >
      Run the entire demo script end-to-end against real staging infrastructure, exactly as
      it will be shown to Frank. No mocks — this is the whole point after 2026-07-09's
      "this is not live" reaction.
    expectations:
      - day: "T-1 (2026-07-16)"
        outcome: "All 3 points demoed live: watchdog detects a real dbt failure; SQL Server disk-low alert fires from the real Docker sandbox; a surgical PR opens and is shown NOT auto-merging"
      - day: "T-1"
        outcome: "Demo script + talking points finalized (Suzanne/Matt)"

  - title: "T-0 — Demo day"
    description: Decision gate.
    expectations:
      - day: "2026-07-17"
        outcome: "Demo delivered to Frank"
      - day: "Post"
        outcome: "Decision recorded (Won / Lost / Extended) with rationale"

  - title: "Track C — Lineage-aware data quality (post-demo, honest framing for 7/17)"
    description: >
      New capability, scoped 2026-07-12 after Kuri's example: a pipeline can run with ZERO
      errors while a source column silently degrades (NULLs where real values used to be),
      poisoning Gold/Diamond numbers with no alert anywhere. NOT achievable by 7/17 — this is
      genuinely new, multi-week work. Full spec: docs/specs/lineage-aware-data-quality.md.
      For the demo: show the anomaly-detection half (real, shipped, GC-12) and frame the
      lineage-tracing half honestly as "we glue dbt/Databricks' own lineage to what they can't
      see themselves" — a real differentiator, not a gap to hide.
    expectations:
      - day: "Post-demo"
        outcome: "BH-1062 — fetch + parse dbt manifest.json/catalog.json (reuses existing artifact-fetch plumbing)"
        linked: [BH-1062]
      - day: "Post-demo"
        outcome: "BH-1063 (platform-core, 2-3 files confirmed pass 6 — no public schema touch, mirrors AnomalyEventNode's cheaper OGM-only pattern) — load parsed DAG into Neo4j as a queryable lineage graph. CORRECTED pass 50: that mirror is incomplete for tenancy — LineageNode needs its own native workspaceId field, since its dependsOn relationship (unlike AnomalyEventNode's dataAsset) never chains to WorkspaceNode."
        linked: [BH-1063]
      - day: "Post-demo"
        outcome: "BH-1064 — wire anomaly events to walk the graph forward, closing the already-deferred BH-673 bridge. Traversal MUST match on LineageNode.relationName (never uniqueId/name, pass 10), reuse the org's existing _fqn_variants() normalization for real format drift (pass 46), AND filter on workspaceId (pass 50) — three real correctness/isolation requirements, not one."
        linked: [BH-1064]
      - day: "Post-demo"
        outcome: "BH-1066 — CONFIRMED pass 5: GC-12 anomaly notifications have zero rendering in Slack/webapp today, independent of this epic's own changes. BH-1064's enrichment has nothing to enrich that a human sees until this ships."
        linked: [BH-1066]
      - day: "Post-demo"
        outcome: "BH-1068 — Snowflake-native lineage adapter (Snowpipe/Tasks/Streams/Dynamic Tables via ACCOUNT_USAGE) — cheaper than the Databricks half connection-wise, reuses the existing SnowflakeConnection. CORRECTED pass 45: needs a permission/latency guard too — the recommended least-privilege role posture silently fails ACCOUNT_USAGE reads (already happened once in this org's real Longaeva POC role, #825), so this is not free just because the connection is reused."
        linked: [BH-1068]
      - day: "Post-demo"
        outcome: "BH-1069 — brightbot call site for upsert_lineage_graph (formerly informal 'BH-1063a'), real ogm_api.py plumbing + GraphQL-errors-key check. ADDED pass 49: the per-model loop MUST share ONE OGMAPISession, not the bare default — that idiom re-authenticates via a live Cognito login on every construction, safe for existing once-per-turn call sites but not for a per-model loop over a real manifest's hundreds of models."
        linked: [BH-1069]
      - day: "Post-demo"
        outcome: "BH-1070 — test coverage gap: metric-snapshot.ts (BH-1063b's own cited precedent) has zero existing tests; non-blocking tech debt, tracked for visibility"
        linked: [BH-1070]
      - day: "Post-demo"
        outcome: "BH-1074 — filed pass 72: Databricks lineage adapter (DatabricksLineageSource) closes Gap 4, which had NO ticket of any kind despite every other spec gap being tracked. Distinct from BH-1044 (Track B's Databricks job/cluster health monitoring — a different Protocol, easily confused since both are 'the Databricks ticket')."
        linked: [BH-1074]

  - title: "Non-blocking, tracked separately"
    description: >
      Real work, correctly scoped OUT of the 7/17 critical path — don't let these stall
      Track B above.
    expectations:
      - day: "Post-demo"
        outcome: "BH-1044 Databricks credential storage/lookup design — RESOLVED pass 24 to a concrete pattern (mirror dbt's per-connection direct-boto3 secret read, keyed on workspace_id+service_id, no caching); ticket status is Needs Refinement (design settled, code not yet built), no longer an open decision"
        linked: [BH-1044]
      - day: "Post-demo"
        outcome: "BH-1053 BrightSignals 3-way split-brain unification"
        linked: [BH-1053]
      - day: "Post-demo"
        outcome: "BH-1055 dispatcher concurrency hardening"
        linked: [BH-1055]
      - day: "Post-demo"
        outcome: "BH-1059 AgentCore/CEMAF migration tracking for the dispatcher's LangGraph Cloud dependency"
        linked: [BH-1059]
      - day: "Post-demo"
        outcome: "BH-1060 customer-PII redaction decision for diagnosis text across ALL 4 real sinks (Slack, webapp inbox, GitHub PR body, AND CloudWatch audit logs via @audit_action — the 4th sink confirmed pass 28, not in the original 3-sink framing); scrub_text() only catches secret shapes (JWT/API-key/etc.), not PII values — non-blocking for 7/17, real gap before production customer data"
        linked: [BH-1060]
      - day: "Post-demo"
        outcome: "BH-1037/1048-1052 ingestion observability (Airbyte/Step-Functions/queue watchdogs) — not named in Frank's 3 points, build after Track B lands"
        linked: [BH-1048, BH-1049, BH-1050, BH-1051, BH-1052]
      - day: "Post-demo"
        outcome: "BH-115/1038-1041 BrightRoutines MCP/A2A surface — separate concern, unaffected by Track B"
