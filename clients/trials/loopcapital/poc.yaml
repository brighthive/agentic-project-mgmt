  - title: "Track E — Agentic SQL Server profiling & DB-level quality health checks (added pass 81, tickets filed pass 82, user-raised)"
    description: >
      Kuri's follow-up ask (2026-07-13): part of the broader BrightHive SaaS vision, connect
      MCP against Microsoft SQL Server so a legacy DB can be agentically identified, scanned,
      and quality-health-checked — a PROFILER at the DB/warehouse level, not just per-table.
      Verified: most plumbing already exists (SynapseConnection already connects to bare SQL
      Server with zero code changes; introspect_warehouse_schema already does warehouse-level
      table discovery with no pre-registered DataAssetNode needed) but the profiler/quality-
      check layer is entirely asset-ID-gated today — no "point it at a whole DB" mode exists,
      and discovery + profiling are never chained end to end. See
      docs/specs/proactive-pipeline-ingestion-monitoring.md's new "Track E" section for full
      detail. Naming decision (is SQL Server a distinct WarehouseType, or a reuse of
      azure_synapse's connector?) RESOLVED pass 82 against the real webapp UI convention —
      a genuine new connection type, not a reuse. 3 tickets filed under epic BH-1036.
    expectations:
      - day: "Post-demo"
        outcome: "BH-1075 — new sql_server WarehouseType/WarehouseServiceProvider connection type across brightbot/platform-core/webapp; connector code reuses SynapseConnection unchanged, only the enum/UI discriminator is new"
        linked: [BH-1075]
      - day: "Post-demo"
        outcome: "BH-1076 — new orchestration chaining introspect_warehouse_schema (discovery) -> per-table profiling (quality_check_agent/analyze_dataset_structure) for tables with no pre-registered DataAssetNode"
        linked: [BH-1076]
      - day: "Post-demo"
        outcome: "BH-1077 — a new DB-level (not per-table) summary report shape aggregating BH-1076's per-table outputs — today's profiler output is always per-asset, never rolled up"
        linked: [BH-1077]
