services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-CU14-ubuntu-22.04
    container_name: loopcapital-sql-sandbox
    platform: linux/amd64 # no native arm64 image; Rosetta/QEMU on Apple Silicon
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:?set MSSQL_SA_PASSWORD before starting}
      # SQL Server Agent is OFF by default in this image — without this,
      # msdb.dbo.sysjobs/sysjobhistory exist but stay empty, and GC-15's
      # job-status query returns nothing. Confirmed via research, not assumed.
      MSSQL_AGENT_ENABLED: "true"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      # System volume — SQL Server's OWN install + the DEFAULT data path
      # (/var/opt/mssql/data), which is where master.mdf/msdb.mdf/model.mdf
      # actually live. This is a real, persistent volume, NOT tmpfs — an
      # earlier version of this file tmpfs-mounted the default data path
      # directly, which wiped master/msdb on every container restart and
      # left SQL Server unable to start (caught in review, fixed here).
      - loopcapital-mssql-system:/var/opt/mssql
      # Fixed-CAPACITY tmpfs mount for LoopCapitalAM's OWN data files ONLY,
      # at a path OUTSIDE SQL Server's default data directory. sys.dm_os_
      # volume_stats reports THIS mount's real free space — a plain bind
      # mount or default Docker volume has no size cap and won't show
      # "20% free" on its own. sql/01_create_database.sql places
      # LoopCapitalAM's files here explicitly via CREATE DATABASE ... ON
      # (FILENAME = ...) — system databases never touch this mount.
      - type: tmpfs
        target: /var/opt/mssql/loopcapital_data
        tmpfs:
          size: ${LOOPCAPITAL_DATA_VOLUME_BYTES:-2147483648} # 2GiB default
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  loopcapital-mssql-system:
    driver: local
